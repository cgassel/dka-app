<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2a1f0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DK Agency">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <title>Find Your Band — Dave Kalz Agency</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    :root {
      --bg:#f0ebe0; --bg2:#e8e0d0; --card:#faf8f4; --card2:#f2ede4;
      --border:#d4c4a0; --bronze1:#C8960C; --bronze2:#A07018; --bronze3:#7A5210;
      --text:#1a1408; --muted:#6b5e48;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:#333; min-height:100vh; padding:20px; }
    .topbar { background:linear-gradient(160deg,#3a2608 0%,#6a4a10 10%,#a07020 20%,#d4a030 30%,#f0c050 42%,#e8b838 50%,#c08820 60%,#906010 70%,#6a4810 82%,#4a3008 90%,#2e1e06 100%); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:48px; border-radius:14px 14px 0 0; box-shadow:0 2px 20px rgba(0,0,0,0.25); }
    .topbar-brand { display:flex; align-items:center; gap:10px; }
    .brand-logo { width:38px; height:38px; object-fit:contain; filter:invert(1) brightness(1.2); }
    .brand-text { display:flex; flex-direction:column; gap:1px; }
    .brand-name { font-size:0.88rem; font-weight:600; color:#f5ead0; }
    .brand-sub  { font-size:0.6rem; font-weight:400; letter-spacing:1.5px; text-transform:uppercase; color:rgba(240,192,80,0.7); }
    .topbar-actions { display:flex; gap:8px; }
    .btn-topbar { background:rgba(0,0,0,0.2); color:rgba(245,234,208,0.85); border:1px solid rgba(200,160,60,0.25); padding:5px 14px; border-radius:6px; font-size:0.75rem; font-weight:600; font-family:'Inter',sans-serif; letter-spacing:0.5px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .btn-topbar:hover { border-color:rgba(240,192,80,0.5); color:rgba(240,192,80,1); }
    .btn-topbar.danger { background:rgba(139,32,0,0.3); border-color:rgba(255,150,150,0.4); }
    .btn-topbar.danger:hover { background:rgba(139,32,0,0.5); }
    .container { max-width:960px; margin:0 auto; background:var(--card); border-radius:0 0 14px 14px; box-shadow:0 4px 20px rgba(0,0,0,0.1); overflow:hidden; }
    .content { padding:36px; }
    .section-title { font-family:'Inter',sans-serif; font-size:1.3rem; font-weight:700; color:var(--bronze2); margin:28px 0 18px; padding-bottom:8px; border-bottom:3px solid var(--bronze2); letter-spacing:1px; text-transform:uppercase; }
    .section-title:first-of-type { margin-top:0; }
    .form-group { margin-bottom:22px; }
    label { display:block; font-weight:600; color:#333; margin-bottom:8px; font-size:0.9rem; }
    .required { color:#D32F2F; }
    input, select, textarea { width:100%; padding:11px 14px; border:2px solid #e0e0e0; border-radius:8px; font-size:0.95rem; font-family:'Inter',sans-serif; transition:border-color 0.2s; box-sizing:border-box; }
    input:focus, select:focus, textarea:focus { outline:none; border-color:var(--bronze2); box-shadow:0 0 0 3px rgba(160,112,24,0.1); }
    textarea { resize:vertical; min-height:80px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    .help-text { font-size:0.82rem; color:#777; margin-top:5px; font-style:italic; }
    .checkbox-group { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
    .checkbox-item { display:flex; align-items:center; gap:7px; }
    .checkbox-item input[type="checkbox"] { width:auto; }
    .button-group { display:flex; gap:14px; margin-top:32px; }
    .btn-primary { flex:2; padding:14px 28px; background:linear-gradient(160deg,#3a2608 0%,#6a4a10 10%,#a07020 20%,#d4a030 30%,#f0c050 42%,#e8b838 50%,#c08820 60%,#906010 70%,#6a4810 82%,#4a3008 90%,#2e1e06 100%); color:#111008; border:none; border-radius:8px; font-family:'Inter',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(80,50,10,0.3); }
    .btn-secondary { flex:1; padding:14px 28px; background:var(--card2); color:var(--muted); border:2px solid var(--border); border-radius:8px; font-family:'Inter',sans-serif; font-size:1.1rem; font-weight:600; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
    .btn-secondary:hover { background:var(--bg2); color:var(--bronze3); }
    .loading { display:none; text-align:center; padding:50px; }
    .spinner { border:4px solid #f3f3f3; border-top:4px solid var(--bronze2); border-radius:50%; width:48px; height:48px; animation:spin 0.8s linear infinite; margin:0 auto 14px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .error-message { background:#ffebee; color:#c62828; padding:14px 16px; border-radius:8px; margin-top:16px; display:none; font-size:0.9rem; }
    .results { display:none; margin-top:32px; }
    .results-header { background:linear-gradient(135deg,rgba(160,112,24,0.08),rgba(200,150,12,0.05)); border:1.5px solid rgba(160,112,24,0.25); padding:18px 22px; border-radius:10px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
    .results-header h2 { font-family:'Inter',sans-serif; color:var(--bronze2); font-size:1.4rem; font-weight:700; }
    .results-header p { color:#555; font-size:0.9rem; }
    .btn-new-search { padding:8px 18px; background:var(--bronze2); color:white; border:none; border-radius:6px; font-family:'Inter',sans-serif; font-size:0.9rem; font-weight:600; letter-spacing:1px; text-transform:uppercase; cursor:pointer; }
    .btn-new-search:hover { background:var(--bronze3); }
    .band-card { background:var(--card); border:2px solid var(--border); border-radius:14px; margin-bottom:18px; overflow:hidden; transition:all 0.2s; cursor:pointer; }
    .band-card:hover { border-color:var(--bronze2); box-shadow:0 4px 18px rgba(160,112,24,0.12); transform:translateY(-2px); }
    .band-card.selected { border-color:#7CB342; background:#f9fdf5; }
    .band-card-header { display:flex; justify-content:space-between; align-items:flex-start; padding:18px 20px 14px; gap:12px; }
    .band-name-block { flex:1; min-width:0; }
    .band-name { font-family:'Inter',sans-serif; font-size:1.4rem; font-weight:800; color:var(--bronze2); letter-spacing:0.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .band-genre-tag { display:inline-block; background:rgba(160,112,24,0.1); color:var(--bronze2); font-size:0.75rem; font-weight:700; padding:2px 10px; border-radius:12px; margin-top:4px; text-transform:uppercase; letter-spacing:0.5px; }
    .band-badges { display:flex; gap:8px; align-items:center; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
    .badge { padding:5px 12px; border-radius:20px; font-size:0.8rem; font-weight:700; letter-spacing:0.5px; white-space:nowrap; }
    .badge-rating-A { background:#1a237e; color:white; }
    .badge-rating-B { background:var(--bronze2); color:white; }
    .badge-rating-C { background:var(--bronze1); color:white; }
    .badge-rating-D { background:#7CB342; color:white; }
    .badge-rating-U { background:#9e9e9e; color:white; }
    .badge-match { background:linear-gradient(135deg,#7CB342,#558B2F); color:white; }
    .badge-available { background:#e8f5e9; color:#2e7d32; border:1.5px solid #a5d6a7; }
    .band-meta { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
    .meta-item { padding:10px 16px; border-right:1px solid var(--border); }
    .meta-item:last-child { border-right:none; }
    .meta-label { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; color:#999; margin-bottom:3px; }
    .meta-value { font-size:0.9rem; font-weight:600; color:#222; }
    .meta-value.w9-yes { color:#2e7d32; }
    .meta-value.w9-no  { color:#c62828; }
    .meta-value.w9-pend{ color:#b45309; }
    .band-rates { display:flex; gap:0; background:#f8fafc; border-bottom:1px solid var(--border); }
    .rate-block { flex:1; padding:12px 16px; border-right:1px solid #e2e8f0; text-align:center; }
    .rate-block:last-child { border-right:none; }
    .rate-label { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:#888; margin-bottom:3px; }
    .rate-value { font-size:1.05rem; font-weight:700; color:#2e7d32; font-family:monospace; }
    .rate-highlight { background:linear-gradient(135deg,rgba(46,125,92,0.08),rgba(124,179,66,0.05)); }
    .band-links { display:flex; gap:10px; padding:10px 16px; flex-wrap:wrap; border-bottom:1px solid var(--border); }
    .band-link { display:inline-flex; align-items:center; gap:5px; font-size:0.78rem; font-weight:600; color:var(--bronze2); text-decoration:none; background:rgba(160,112,24,0.08); padding:4px 10px; border-radius:6px; transition:all 0.15s; }
    .band-link:hover { background:var(--bronze2); color:white; }
    .band-travel { padding:10px 16px; font-size:0.82rem; color:#555; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:6px; }
    .band-admin { display:flex; gap:18px; padding:10px 16px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .admin-item { font-size:0.82rem; color:#555; }
    .admin-item strong { color:#333; }
    .band-hometown { font-size:0.78rem; color:#888; margin-top:2px; }
    .band-card-footer { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; flex-wrap:wrap; gap:10px; }
    .match-reasons { display:flex; flex-wrap:wrap; gap:6px; flex:1; }
    .reason-chip { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; font-size:0.72rem; font-weight:600; padding:3px 8px; border-radius:10px; }
    .request-btn { background:linear-gradient(135deg,#7CB342,#558B2F); color:white; border:none; padding:10px 22px; border-radius:8px; font-family:'Inter',sans-serif; font-size:1rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .request-btn:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(124,179,66,0.4); }
    .request-btn.sent { background:#9e9e9e; cursor:default; transform:none; box-shadow:none; }
    .no-results { text-align:center; padding:60px 20px; color:#888; }
    .no-results h3 { font-family:'Inter',sans-serif; font-size:1.5rem; margin-bottom:8px; color:#555; }
    @media (max-width:600px) { .row { grid-template-columns:1fr; } .band-meta { grid-template-columns:1fr 1fr; } .band-rates { flex-direction:column; } }
  </style>
</head>
<body>

  <div style="max-width:960px;margin:0 auto;">
    <div class="topbar">
      <div class="topbar-brand">
        <img class="brand-logo" src="icons/dka-logo.png" alt="DKA">
        <div class="brand-text">
          <div class="brand-name">Dave Kalz Agency</div>
          <div class="brand-sub">Find Your Band</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="btn-topbar" onclick="goBackToCalendar()">&#8592; Calendar</button>
        <button class="btn-topbar danger" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </div>

  <div class="container" style="max-width:960px;margin:0 auto;">
    <div class="content">

      <form id="requestForm" onsubmit="return handleSubmit(event)">

        <div class="section-title">Event Details</div>
        <div class="row">
          <div class="form-group">
            <label>Event Date <span class="required">*</span></label>
            <input type="date" id="eventDate" required>
          </div>
          <div class="form-group">
            <label>Event Type</label>
            <select id="eventType">
              <option value="Public Show">Public Show</option>
              <option value="Private Party">Private Party</option>
              <option value="Corporate Event">Corporate Event</option>
              <option value="Festival">Festival</option>
              <option value="Wedding">Wedding</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="form-group">
            <label>Start Time <span class="required">*</span></label>
            <input type="time" id="startTime" required value="20:00">
          </div>
          <div class="form-group">
            <label>End Time <span class="required">*</span></label>
            <input type="time" id="endTime" required value="23:30">
          </div>
        </div>

        <div class="section-title">Budget</div>
        <div class="form-group">
          <label>Budget Range <span class="required">*</span></label>
          <select id="budgetRange" required>
            <option value="">-- Select Budget --</option>
            <option value="0-500">$0 – $500</option>
            <option value="500-1000">$500 – $1,000</option>
            <option value="1000-1500">$1,000 – $1,500</option>
            <option value="1500-2000">$1,500 – $2,000</option>
            <option value="2000+">$2,000+</option>
          </select>
        </div>

        <div class="section-title">Music Preferences</div>
        <div class="form-group">
          <label>Preferred Genres <span class="required">*</span></label>
          <div class="checkbox-group">
            <div class="checkbox-item"><input type="checkbox" id="g_rock"    value="Rock">         <label for="g_rock">Rock</label></div>
            <div class="checkbox-item"><input type="checkbox" id="g_blues"   value="Blues">        <label for="g_blues">Blues</label></div>
            <div class="checkbox-item"><input type="checkbox" id="g_jazz"    value="Jazz">         <label for="g_jazz">Jazz</label></div>
            <div class="checkbox-item"><input type="checkbox" id="g_country" value="Country">      <label for="g_country">Country</label></div>
            <div class="checkbox-item"><input type="checkbox" id="g_rb"      value="R&B/Soul">     <label for="g_rb">R&amp;B/Soul</label></div>
            <div class="checkbox-item"><input type="checkbox" id="g_folk"    value="Folk">         <label for="g_folk">Folk</label></div>
            <div class="checkbox-item"><input type="checkbox" id="g_alt"     value="Alternative">  <label for="g_alt">Alternative</label></div>
            <div class="checkbox-item"><input type="checkbox" id="g_classic" value="Classic Rock">  <label for="g_classic">Classic Rock</label></div>
            <div class="checkbox-item"><input type="checkbox" id="g_funk"    value="Funk">         <label for="g_funk">Funk</label></div>
            <div class="checkbox-item"><input type="checkbox" id="g_pop"     value="Pop">          <label for="g_pop">Pop</label></div>
            <div class="checkbox-item"><input type="checkbox" id="g_cover"   value="Cover Band">   <label for="g_cover">Cover Band</label></div>
          </div>
          <div class="help-text">Select all that apply</div>
        </div>
        <div class="form-group">
          <label>Minimum Band Rating</label>
          <select id="minRating">
            <option value="">Any Rating</option>
            <option value="A">A — Top Tier (150+ draw)</option>
            <option value="B">B — Strong (75–149 draw)</option>
            <option value="C">C — Good (40–74 draw)</option>
            <option value="D">D — Developing (25–39 draw)</option>
          </select>
        </div>

        <div class="section-title">Technical Details</div>
        <div class="form-group">
          <label>Sound &amp; Lighting</label>
          <select id="soundLights">
            <option value="Venue">We provide sound/lights (lower band rate applies)</option>
            <option value="Band">Band brings their own (higher band rate applies)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Additional Requirements</label>
          <textarea id="additionalNotes" placeholder="Special requests, set length, load-in time, etc."></textarea>
        </div>

        <div class="error-message" id="errorMsg"></div>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p style="color:#666;">Finding available bands…</p>
        </div>

        <div class="button-group">
          <button type="button" class="btn-secondary" onclick="goBackToCalendar()">&#8592; Back to Calendar</button>
          <button type="submit" class="btn-primary">&#128269; Find Bands</button>
        </div>
      </form>

      <div class="results" id="results">
        <div class="results-header">
          <div>
            <h2 id="resultsTitle">Available Bands</h2>
            <p id="resultsCount"></p>
          </div>
          <button class="btn-new-search" onclick="newSearch()">New Search</button>
        </div>
        <div id="bandsList"></div>
        <div class="no-results" id="noResults" style="display:none;">
          <h3>&#128542; No Available Bands Found</h3>
          <p>Try adjusting your budget, date, or genre preferences</p>
        </div>
      </div>

    </div>
  </div>

  <script src="api.js"></script>
  <script src="venue-booking-request.js"></script>
</body>
</html>
